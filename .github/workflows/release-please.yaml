name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When the release PR is created/updated, sync import_map.json
      # to match the bumped package versions
      - if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - if: ${{ steps.release.outputs.pr }}
        uses: denoland/setup-deno@v2

      - if: ${{ steps.release.outputs.pr }}
        run: deno run -A _tools/sync_import_map.ts

      - if: ${{ steps.release.outputs.pr }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add import_map.json
          git diff --staged --quiet || git commit -m "chore: sync import_map.json versions"
          git push

      # When releases are created, publish to JSR
      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: actions/checkout@v6

      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: denoland/setup-deno@v2

      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: deno publish
